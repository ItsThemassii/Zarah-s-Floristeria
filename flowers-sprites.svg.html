<!-- Reusable SVG flower symbols. Include with <svg><use href="#flower-hibiscus"/></svg> -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>

    <!-- HIBISCUS — 5 broad petals + long stamen -->
    <symbol id="flower-hibiscus" viewBox="0 0 30 30">
      <g transform="translate(15 14)">
        <g transform="rotate(0)">
          <path d="M0 -2 C -4 -3, -5.5 -8, -3 -11 C 0 -12.5, 3 -12.5, 3 -11 C 5.5 -8, 4 -3, 0 -2 Z" fill="#d96b8e"/>
          <path d="M0 -2 C -2.5 -3.5, -3 -7, -1.5 -9.5 C 1.5 -9.5, 2.5 -7, 0 -2 Z" fill="#a83e6c" opacity="0.55"/>
        </g>
        <g transform="rotate(72)">
          <path d="M0 -2 C -4 -3, -5.5 -8, -3 -11 C 0 -12.5, 3 -12.5, 3 -11 C 5.5 -8, 4 -3, 0 -2 Z" fill="#d96b8e"/>
          <path d="M0 -2 C -2.5 -3.5, -3 -7, -1.5 -9.5 C 1.5 -9.5, 2.5 -7, 0 -2 Z" fill="#a83e6c" opacity="0.55"/>
        </g>
        <g transform="rotate(144)">
          <path d="M0 -2 C -4 -3, -5.5 -8, -3 -11 C 0 -12.5, 3 -12.5, 3 -11 C 5.5 -8, 4 -3, 0 -2 Z" fill="#d96b8e"/>
          <path d="M0 -2 C -2.5 -3.5, -3 -7, -1.5 -9.5 C 1.5 -9.5, 2.5 -7, 0 -2 Z" fill="#a83e6c" opacity="0.55"/>
        </g>
        <g transform="rotate(216)">
          <path d="M0 -2 C -4 -3, -5.5 -8, -3 -11 C 0 -12.5, 3 -12.5, 3 -11 C 5.5 -8, 4 -3, 0 -2 Z" fill="#d96b8e"/>
          <path d="M0 -2 C -2.5 -3.5, -3 -7, -1.5 -9.5 C 1.5 -9.5, 2.5 -7, 0 -2 Z" fill="#a83e6c" opacity="0.55"/>
        </g>
        <g transform="rotate(288)">
          <path d="M0 -2 C -4 -3, -5.5 -8, -3 -11 C 0 -12.5, 3 -12.5, 3 -11 C 5.5 -8, 4 -3, 0 -2 Z" fill="#d96b8e"/>
          <path d="M0 -2 C -2.5 -3.5, -3 -7, -1.5 -9.5 C 1.5 -9.5, 2.5 -7, 0 -2 Z" fill="#a83e6c" opacity="0.55"/>
        </g>
        <!-- Long curved stamen -->
        <path d="M0 0 Q 3 4, 5 8" stroke="#c89b5c" stroke-width="0.8" fill="none" stroke-linecap="round"/>
        <circle cx="5.2" cy="8.2" r="0.7" fill="#c89b5c"/>
        <circle cx="4" cy="6" r="0.5" fill="#c89b5c"/>
        <circle cx="2.5" cy="3.5" r="0.5" fill="#c89b5c"/>
        <!-- Center -->
        <circle r="1.6" fill="#8a3724"/>
      </g>
    </symbol>

    <!-- COSMOS — 8 thin paddle petals -->
    <symbol id="flower-cosmos" viewBox="0 0 22 22">
      <g transform="translate(11 11)">
        <g transform="rotate(0)"><ellipse cx="0" cy="-6.5" rx="1.6" ry="4.2" fill="#e89bbc"/></g>
        <g transform="rotate(45)"><ellipse cx="0" cy="-6.5" rx="1.6" ry="4.2" fill="#d97da3"/></g>
        <g transform="rotate(90)"><ellipse cx="0" cy="-6.5" rx="1.6" ry="4.2" fill="#e89bbc"/></g>
        <g transform="rotate(135)"><ellipse cx="0" cy="-6.5" rx="1.6" ry="4.2" fill="#d97da3"/></g>
        <g transform="rotate(180)"><ellipse cx="0" cy="-6.5" rx="1.6" ry="4.2" fill="#e89bbc"/></g>
        <g transform="rotate(225)"><ellipse cx="0" cy="-6.5" rx="1.6" ry="4.2" fill="#d97da3"/></g>
        <g transform="rotate(270)"><ellipse cx="0" cy="-6.5" rx="1.6" ry="4.2" fill="#e89bbc"/></g>
        <g transform="rotate(315)"><ellipse cx="0" cy="-6.5" rx="1.6" ry="4.2" fill="#d97da3"/></g>
        <circle r="1.9" fill="#c89b5c"/>
        <circle r="0.7" fill="#8a6438"/>
      </g>
    </symbol>

    <!-- MARGARITA (daisy) — many thin petals -->
    <symbol id="flower-margarita" viewBox="0 0 22 22">
      <g transform="translate(11 11)">
        <g transform="rotate(0)"><ellipse cx="0" cy="-7" rx="1.1" ry="4" fill="#fff5fa" stroke="#c75a87" stroke-width="0.3"/></g>
        <g transform="rotate(30)"><ellipse cx="0" cy="-7" rx="1.1" ry="4" fill="#fff5fa" stroke="#c75a87" stroke-width="0.3"/></g>
        <g transform="rotate(60)"><ellipse cx="0" cy="-7" rx="1.1" ry="4" fill="#fff5fa" stroke="#c75a87" stroke-width="0.3"/></g>
        <g transform="rotate(90)"><ellipse cx="0" cy="-7" rx="1.1" ry="4" fill="#fff5fa" stroke="#c75a87" stroke-width="0.3"/></g>
        <g transform="rotate(120)"><ellipse cx="0" cy="-7" rx="1.1" ry="4" fill="#fff5fa" stroke="#c75a87" stroke-width="0.3"/></g>
        <g transform="rotate(150)"><ellipse cx="0" cy="-7" rx="1.1" ry="4" fill="#fff5fa" stroke="#c75a87" stroke-width="0.3"/></g>
        <g transform="rotate(180)"><ellipse cx="0" cy="-7" rx="1.1" ry="4" fill="#fff5fa" stroke="#c75a87" stroke-width="0.3"/></g>
        <g transform="rotate(210)"><ellipse cx="0" cy="-7" rx="1.1" ry="4" fill="#fff5fa" stroke="#c75a87" stroke-width="0.3"/></g>
        <g transform="rotate(240)"><ellipse cx="0" cy="-7" rx="1.1" ry="4" fill="#fff5fa" stroke="#c75a87" stroke-width="0.3"/></g>
        <g transform="rotate(270)"><ellipse cx="0" cy="-7" rx="1.1" ry="4" fill="#fff5fa" stroke="#c75a87" stroke-width="0.3"/></g>
        <g transform="rotate(300)"><ellipse cx="0" cy="-7" rx="1.1" ry="4" fill="#fff5fa" stroke="#c75a87" stroke-width="0.3"/></g>
        <g transform="rotate(330)"><ellipse cx="0" cy="-7" rx="1.1" ry="4" fill="#fff5fa" stroke="#c75a87" stroke-width="0.3"/></g>
        <circle r="2.4" fill="#e8a85c"/>
        <circle r="1" fill="#a87838" opacity="0.6"/>
      </g>
    </symbol>

    <!-- TULIP — cup shape with stem and leaf -->
    <symbol id="flower-tulipan" viewBox="0 0 22 32">
      <!-- stem -->
      <path d="M11 14 Q 10.5 22, 11 31" stroke="#7a8f5e" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      <!-- curved leaf -->
      <path d="M11 22 Q 3 19, 4 27 Q 9 25, 11 24 Z" fill="#7a8f5e"/>
      <path d="M11 22 Q 4 21, 4.5 26" stroke="#5a6a44" stroke-width="0.3" fill="none"/>
      <!-- back petals (darker) -->
      <path d="M4 11 C 4 7, 6 2, 11 2 C 16 2, 18 7, 18 11 Z" fill="#a83e6c"/>
      <!-- front center petal (lighter) -->
      <path d="M7 12 C 7 9, 8 3, 11 3 C 14 3, 15 9, 15 12 Z" fill="#d96b8e"/>
      <!-- highlight -->
      <path d="M9 11 C 9 8, 9.5 5, 11 5 C 12.5 5, 13 8, 13 11 Z" fill="#e89bbc" opacity="0.55"/>
    </symbol>

  </defs>
</svg>
